openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SeedTrack Pro API - Asset & Batch Management
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: assets
    description: Seed asset inventory operations
  - name: history
    description: Batch movement history operations
  - name: dashboard
    description: Dashboard summaries and alerts
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List all seed assets
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create a new seed asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "201":
          description: Asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get a single asset by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found
    put:
      operationId: updateAsset
      tags: [assets]
      summary: Update an existing asset
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "200":
          description: Asset updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /assets/{id}/history:
    get:
      operationId: listAssetHistory
      tags: [history]
      summary: List movement history for an asset
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Movement events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovementEvent"
    post:
      operationId: createAssetHistory
      tags: [history]
      summary: Record a new movement event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovementEventInput"
      responses:
        "201":
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementEvent"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Aggregate counts for the dashboard
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/alerts:
    get:
      operationId: getAlerts
      tags: [dashboard]
      summary: Lists of expiring, expired, and low-stock assets
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertGroups"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Most recent movement events across all assets
      responses:
        "200":
          description: Recent events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentActivity"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    AssetStatus:
      type: string
      enum: [Fresh, Expiring, Expired]

    MovementEventType:
      type: string
      enum: [Created, Stored, Dispatched, Delivered]

    Asset:
      type: object
      properties:
        id:
          type: string
        seedName:
          type: string
        batchNumber:
          type: string
        quantity:
          type: integer
          minimum: 0
        location:
          type: string
        expiryDate:
          type: string
          format: date
        status:
          $ref: "#/components/schemas/AssetStatus"
        createdAt:
          type: string
          format: date-time
      required: [id, seedName, batchNumber, quantity, location, expiryDate, status, createdAt]

    AssetInput:
      type: object
      properties:
        seedName:
          type: string
          minLength: 1
        batchNumber:
          type: string
          minLength: 1
        quantity:
          type: integer
          minimum: 0
        location:
          type: string
          minLength: 1
        expiryDate:
          type: string
          format: date
      required: [seedName, batchNumber, quantity, location, expiryDate]

    MovementEvent:
      type: object
      properties:
        id:
          type: string
        assetId:
          type: string
        type:
          $ref: "#/components/schemas/MovementEventType"
        location:
          type: string
        notes:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [id, assetId, type, location, timestamp]

    MovementEventInput:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/MovementEventType"
        location:
          type: string
          minLength: 1
        notes:
          type: string
      required: [type, location]

    DashboardSummary:
      type: object
      properties:
        totalAssets:
          type: integer
        totalQuantity:
          type: integer
        expiringSoon:
          type: integer
        lowStock:
          type: integer
        expired:
          type: integer
        fresh:
          type: integer
      required: [totalAssets, totalQuantity, expiringSoon, lowStock, expired, fresh]

    AlertGroups:
      type: object
      properties:
        expiringSoon:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        expired:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        lowStock:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
      required: [expiringSoon, expired, lowStock]

    RecentActivity:
      type: object
      properties:
        event:
          $ref: "#/components/schemas/MovementEvent"
        seedName:
          type: string
        batchNumber:
          type: string
      required: [event, seedName, batchNumber]
